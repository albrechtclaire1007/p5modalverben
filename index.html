<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>P5 – Modalverben</title>

<style>
@font-face{
  font-family:'Schoulschrëft';
  src:url('https://raw.githubusercontent.com/albrechtclaire1007/schoulschreft/main/schoulschreft_bold%5B2%5D.TTF') format('truetype');
  font-weight:bold; font-style:normal; font-display:swap;
}

:root{
  --bg1:#FCF09C;
  --bg2:#FFD51E;

  --bar:#1f1f1f;
  --barBorder:#000;

  --ink:#1f1f1f;
  --white:#fff;
  --border:3px;
  --shadow:0 10px 24px rgba(0,0,0,.08);
  --pad:clamp(10px,2.2vw,16px);
  --r:18px;

  --iconArrow:"https://i.postimg.cc/BL81zWV4/p5arrow.png";
  --iconPlay:"https://i.postimg.cc/vg16KRNQ/p5play.png";
  --iconReplay:"https://i.postimg.cc/Q9BWzLyj/p5replay.png";
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;outline:none;}

html,body{
  height:100%;margin:0;
  background:linear-gradient(135deg,var(--bg2),var(--bg1));
  color:var(--ink);
  font-family:'Schoulschrëft', Arial, sans-serif;
}

button,input,select{font-family:'Schoulschrëft', Arial, sans-serif;}

.topBar{
  position:sticky; top:10px; z-index:10;
  width:min(1200px,96vw);
  margin:10px auto 0;
  background:var(--bar);
  border:var(--border) solid var(--barBorder);
  border-radius:999px;
  box-shadow:var(--shadow);
  padding:10px 12px;

  display:grid;
  grid-template-columns:70px 1fr auto;
  align-items:center;
  gap:10px;
}

.barBtn{
  border:none;background:transparent;
  cursor:pointer;
  display:grid;place-items:center;
  width:54px;height:54px;
}

.barBtn img{width:46px;height:46px;object-fit:contain;}
.barBtn.back img{transform:rotate(180deg);}
.barBtn:active{transform:scale(.98);}

.barTitle{
  text-align:center;
  color:#fff;
  font-size:clamp(1.5rem,3.2vw,2.4rem);
  margin:0;
  line-height:1.1;
}

.barRight{display:flex;align-items:center;gap:6px;}
.barRight .barBtn{width:50px;height:50px;}
.barRight .barBtn img{width:42px;height:42px;}

.wrap{
  width:min(1200px,96vw);
  margin:18px auto 26px;
  padding:var(--pad);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.exercise{display:none;}
.exercise.active{display:block;}

.card{
  background:rgba(255,255,255,.82);
  border:var(--border) solid rgba(255,255,255,.65);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:clamp(12px,2.2vw,18px);
}

.instruction{
  border:3px solid rgba(0,0,0,.08);
  border-radius:16px;
  padding:14px;
  text-align:center;
  font-size:clamp(1.05rem,2.2vw,1.3rem);
  margin-bottom:14px;
  background:rgba(255,255,255,.7);
}

.bigBox{
  width:min(900px,100%);
  margin:0 auto;
  background:#fff;
  border:3px solid rgba(0,0,0,.08);
  border-radius:18px;
  padding:20px;
  text-align:center;
}

.prompt{
  font-size:clamp(2rem,5vw,3rem);
}

.choices{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:16px;
}

.choice{
  padding:12px 16px;
  border-radius:16px;
  border:2px solid rgba(0,0,0,.15);
  background:#fff;
  font-size:clamp(1.1rem,2.2vw,1.35rem);
  cursor:pointer;
}

.choice:active{transform:scale(.98);}

.feedback{
  text-align:center;
  font-size:clamp(1.1rem,2.2vw,1.4rem);
  min-height:1.5em;
  margin-top:10px;
}

.feedback.ok{color:#0b7a35;}
.feedback.bad{color:#b32b2b;}

.bottomNav{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:16px;
}

.bottomBtn{
  width:60px;height:60px;
  border:none;
  background:#fff;
  border-radius:999px;
  border:3px solid rgba(0,0,0,.2);
  cursor:pointer;
  display:grid;place-items:center;
}

.bottomBtn img{width:40px;height:40px;}

.bottomBtn.back img{transform:rotate(180deg);}

.bottomBtn:active{transform:scale(.95);}

</style>
</head>

<body>

<div class="topBar">
  <button class="barBtn back" id="prevPage"><img src="https://i.postimg.cc/BL81zWV4/p5arrow.png"></button>
  <h1 class="barTitle" id="title">P5 – Modalverben</h1>
  <div class="barRight">
    <button class="barBtn" id="play"><img src="https://i.postimg.cc/vg16KRNQ/p5play.png"></button>
    <button class="barBtn" id="replay"><img src="https://i.postimg.cc/Q9BWzLyj/p5replay.png"></button>
    <button class="barBtn" id="nextPage"><img src="https://i.postimg.cc/BL81zWV4/p5arrow.png"></button>
  </div>
</div>

<div class="wrap">

<!-- GAME 1 -->
<section class="exercise active" id="g1">
<div class="card">
<div class="instruction">Wéi ass déi richteg konjugéiert Form?</div>

<div class="bigBox">
<div class="prompt" id="g1Prompt"></div>
<div class="choices" id="g1Choices"></div>
</div>

<div class="feedback" id="g1Fb"></div>
</div>
</section>

<!-- GAME 2 -->
<section class="exercise" id="g2">
<div class="card">
<div class="instruction">Wiel déi richteg konjugéiert Form.</div>

<div class="bigBox">
<div class="prompt" id="g2Prompt"></div>
<div class="choices" id="g2Choices"></div>
</div>

<div class="feedback" id="g2Fb"></div>
</div>
</section>

<!-- GAME 3 -->
<section class="exercise" id="g3">
<div class="card">

<div class="instruction">Konjugéier mëndlech.</div>

<div class="bigBox">
<div class="prompt" id="g3Prompt"></div>
</div>

<div class="bottomNav">
<button class="bottomBtn back" id="g3Prev">
<img src="https://i.postimg.cc/BL81zWV4/p5arrow.png">
</button>

<button class="bottomBtn" id="g3Next">
<img src="https://i.postimg.cc/BL81zWV4/p5arrow.png">
</button>
</div>

</div>
</section>

</div>

<script>

/* DATA */

const PERSONS=[
{key:"ech",label:"ech"},
{key:"du",label:"du"},
{key:"hien",label:"hien/hatt"},
{key:"mir",label:"mir"},
{key:"dir",label:"dir"},
{key:"si",label:"si"}
];

const VERBS=[
{
inf:"kënnen",
forms:{ech:"kann",du:"kanns",hien:"kann",mir:"kënnen",dir:"kënnt",si:"kënnen"}
},
{
inf:"sollen",
forms:{ech:"soll",du:"solls",hien:"soll",mir:"sollen",dir:"sollt",si:"sollen"}
},
{
inf:"däerfen",
forms:{ech:"däerf",du:"däerfs",hien:"däerf",mir:"däerfen",dir:"däerft",si:"däerfen"}
},
{
inf:"brauchen",
forms:{ech:"brauch",du:"brauchs",hien:"brauch",mir:"brauchen",dir:"braucht",si:"brauchen"}
},
{
inf:"wëllen",
forms:{ech:"well",du:"wëlls",hien:"wëll",mir:"wellen",dir:"wellt",si:"wellen"}
},
{
inf:"mussen",
forms:{ech:"muss",du:"muss",hien:"muss",mir:"mussen",dir:"musst",si:"mussen"}
}
];

function shuffle(a){
let b=[...a];
for(let i=b.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[b[i],b[j]]=[b[j],b[i]];
}
return b;
}

function randomItem(a){return a[Math.floor(Math.random()*a.length)]}

/* ===== GAME 1 ===== */

let g1Deck=[];
let g1Index=0;

function buildDeck(){
let deck=[];
VERBS.forEach(v=>{
PERSONS.forEach(p=>{
deck.push({verb:v.inf,person:p.key});
});
});
return shuffle(deck);
}

function correctForm(verb,person){
return VERBS.find(v=>v.inf===verb).forms[person];
}

function g1Render(){

let item=g1Deck[g1Index];
let prompt=item.verb+", "+PERSONS.find(p=>p.key===item.person).label;

document.getElementById("g1Prompt").textContent=prompt;

let correct=correctForm(item.verb,item.person);

let wrong1=correct+"t";
let wrong2=correct.slice(0,-1);

let options=shuffle([correct,wrong1,wrong2]);

let wrap=document.getElementById("g1Choices");
wrap.innerHTML="";

options.forEach(o=>{
let b=document.createElement("button");
b.className="choice";
b.textContent=o;

b.onclick=()=>{
let ok=o===correct;

document.getElementById("g1Fb").textContent=ok?"Richteg!":"Nee.";

setTimeout(()=>{
g1Index++;
if(g1Index>=g1Deck.length)g1Deck=buildDeck(),g1Index=0;
g1Render();
},600);
};

wrap.appendChild(b);
});
}

function g1Reset(){
g1Deck=buildDeck();
g1Index=0;
g1Render();
}

/* ===== GAME 2 ===== */

let g2Deck=[];
let g2Index=0;

function g2Render(){

let item=g2Deck[g2Index];
let prompt=item.verb+", "+PERSONS.find(p=>p.key===item.person).label;

document.getElementById("g2Prompt").textContent=prompt;

let correct=correctForm(item.verb,item.person);

let wrong1=correct+"n";
let wrong2=correct+"s";

let options=shuffle([correct,wrong1,wrong2]);

let wrap=document.getElementById("g2Choices");
wrap.innerHTML="";

options.forEach(o=>{
let b=document.createElement("button");
b.className="choice";
b.textContent=o;

b.onclick=()=>{
let ok=o===correct;

document.getElementById("g2Fb").textContent=ok?"Richteg!":"Nee.";

setTimeout(()=>{
g2Index++;
if(g2Index>=g2Deck.length)g2Deck=buildDeck(),g2Index=0;
g2Render();
},600);
};

wrap.appendChild(b);
});
}

function g2Reset(){
g2Deck=buildDeck();
g2Index=0;
g2Render();
}

/* ===== GAME 3 ===== */

let g3Deck=[];
let g3Index=0;

function g3Render(){
let item=g3Deck[g3Index];
document.getElementById("g3Prompt").textContent=item.verb+", "+PERSONS.find(p=>p.key===item.person).label;
}

function g3Next(){
g3Index++;
if(g3Index>=g3Deck.length)g3Deck=buildDeck(),g3Index=0;
g3Render();
}

function g3Prev(){
g3Index--;
if(g3Index<0)g3Index=g3Deck.length-1;
g3Render();
}

document.getElementById("g3Next").onclick=g3Next;
document.getElementById("g3Prev").onclick=g3Prev;

/* ===== NAV ===== */

const exercises=[...document.querySelectorAll(".exercise")];
let exIndex=0;

function showExercise(i){
exercises.forEach((e,n)=>e.classList.toggle("active",n===i));
exIndex=i;
}

document.getElementById("prevPage").onclick=()=>{
showExercise((exIndex+exercises.length-1)%exercises.length);
};

document.getElementById("nextPage").onclick=()=>{
showExercise((exIndex+1)%exercises.length);
};

document.getElementById("replay").onclick=()=>{
if(exIndex===0)g1Reset();
if(exIndex===1)g2Reset();
if(exIndex===2)g3Deck=buildDeck(),g3Index=0,g3Render();
};

/* INIT */

g1Deck=buildDeck();
g2Deck=buildDeck();
g3Deck=buildDeck();

g1Render();
g2Render();
g3Render();

</script>

</body>
</html>
